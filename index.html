<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#080b13"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><title>西游记世界 · WebAssembly</title><link rel="stylesheet" href="style.css"></head><body><div id="rotator"><main id="game-shell" aria-label="西游记世界游戏区域"><section id="screen-frame" aria-label="游戏画面"><canvas id="game-canvas" width="256" height="240"></canvas><div class="screen-glass" aria-hidden="true"></div></section><section id="dpad-cluster" class="control-cluster" data-cluster="dpad" aria-label="可拖动方向手柄"><button class="drag-handle" aria-label="拖动方向手柄位置" title="拖动手柄位置">⠿</button><div id="dpad" role="application" aria-label="方向摇杆"><span class="dpad-mark up">▲</span><span class="dpad-mark right">▶</span> <span class="dpad-mark down">▼</span><span class="dpad-mark left">◀</span><div id="stick-knob"></div></div></section><section id="action-cluster" class="control-cluster action-cluster" data-cluster="action" aria-label="可拖动动作手柄"><button class="drag-handle" aria-label="拖动动作手柄位置" title="拖动手柄位置">⠿</button> <button class="game-button button-b" data-mask="2" aria-label="B 键"><span>B</span></button> <button class="game-button button-a" data-mask="1" aria-label="A 键"><span>A</span></button></section><section id="system-cluster" class="control-cluster system-cluster" data-cluster="system" aria-label="可拖动功能按键"><button class="drag-handle" aria-label="拖动功能按键位置" title="拖动手柄位置">⠿</button> <button class="pill-button" data-mask="4" aria-label="选择键">SELECT</button> <button class="pill-button" data-mask="8" aria-label="开始键">START</button></section><div id="status" role="status" aria-live="polite"></div></main></div><button id="launch" type="button" aria-label="开始游戏"><span>▶</span></button><script type="module" src="app.js"></script></body></html>
